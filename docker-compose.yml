services:

  frontend:
    image: nginx:alpine
    container_name: videoflix_frontend
    ports:
      - "5500:80"
    volumes:
      - ./project.Videoflix:/usr/share/nginx/html:ro

  db:
    image: postgres:17
    container_name: videoflix_database
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:latest
    container_name: videoflix_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: backend.Dockerfile
    env_file: .env
    container_name: videoflix_backend

    volumes:
      - .:/app
      - videoflix_media:/app/media
      - videoflix_static:/app/static
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - USE_SQLITE_FOR_TESTS=False
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend.Dockerfile
    env_file: .env
    container_name: videoflix_worker
    command: ["python", "manage.py", "rqworker", "default"]
    volumes:
      - .:/app
      - videoflix_media:/app/media
      - videoflix_static:/app/static
    environment:
      - PYTHONUNBUFFERED=1
      - USE_SQLITE_FOR_TESTS=False
    depends_on:
      web:
        condition: service_started
      redis:
        condition: service_healthy




volumes:
  postgres_data:
  redis_data:
  videoflix_media:
  videoflix_static:
